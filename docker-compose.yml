services:

  postgres:
    image: postgres:15
    container_name: panel-postgres
    restart: always
    environment:
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: panel123
      POSTGRES_DB: paneldb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: panel-redis
    restart: always
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: panel-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb?currentSchema=public
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  backend:
    build: ./backend
    container_name: panel-backend
    restart: always
    environment:
      DATABASE_URL: postgres://panel:panel123@postgres:5432/paneldb
      REDIS_HOST: redis

      # Keycloak
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: master
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123

      # Elastic Stack
      KIBANA_BASE_URL: http://192.168.10.162:5601
      ELASTICSEARCH_URL: https://192.168.10.162:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: "LDV5n*M-HLKf8RrtQGJI"
      ELASTICSEARCH_API_KEY: ""
      ELASTICSEARCH_INSECURE: "true"

      # Fleet (usa la misma URL de Kibana + API key de Elastic)
      # FLEET_URL se puede dejar vacío para que tome KIBANA_BASE_URL
      FLEET_URL: ""
      FLEET_API_KEY: ""

      # Proxmox
      PROXMOX_URL: https://192.168.10.20:8006/api2/json
      PROXMOX_TOKEN: "PVEAPIToken=root@pam!krts=7bd7045b-0ca8-4a8a-a477-3b892e5911ee"
      PROXMOX_NODE: hyperprox
      PROXMOX_HOST: 192.168.10.20

      # Jira Cloud
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-CM}
      JIRA_DEFAULT_ISSUE_TYPE_NAME: ${JIRA_DEFAULT_ISSUE_TYPE_NAME:-}

    depends_on:
      - postgres
      - redis
      - keycloak

  frontend:
    build: ./frontend
    container_name: panel-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    ports:
      - "3001:3000"

  nginx:
    image: nginx:latest
    container_name: panel-nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
